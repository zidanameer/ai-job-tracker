spring:
  application:
    name: ai-job-tracker
  jackson:
    # All HTTP request/response JSON uses snake_case on the wire while the Java
    # DTOs keep idiomatic camelCase fields — no per-DTO annotations needed.
    # NOTE: this is the public-API mapper only. The LLM-boundary JSON is parsed
    # by a separate mapper in AnalysisService, so Claude still gets camelCase.
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: ${DB_USERNAME:jobtracker}
    password: ${DB_PASSWORD:change-me}
  jpa:
    hibernate:
      # Slice-1 convenience. Move to Flyway/Liquibase migrations before any
      # shared/deployed environment.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

gemini:
  model: gemini-2.5-flash
  api-key: ${GEMINI_API_KEY}

server:
  port: 8080
